name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: corepack enable && pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm build

      - run: pnpm vitest run

      - name: Determine version bump
        id: bump
        run: |
          BUMP_TYPE=$(bash scripts/bump-version.sh)
          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push tag
        run: |
          npm version ${{ steps.bump.outputs.bump_type }} -m "chore: release v%s [skip ci]"
          git push --follow-tags

      - name: Remove .npmrc auth token for OIDC
        run: sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG" || true

      - name: Publish to npm via OIDC
        env:
          NODE_AUTH_TOKEN: ""
        run: npx npm@latest publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create v$(node -p "require('./package.json').version") --title "v$(node -p "require('./package.json').version")" --generate-notes