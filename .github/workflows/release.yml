name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if commit message starts with [skip ci] or [ci skip]
    if: "!startsWith(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag comparison

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - run: corepack enable && pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm vitest run

      - name: Determine version bump
        id: bump
        run: echo "type=$(bash scripts/bump-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Bump version and publish
        run: |
          npm version ${{ steps.bump.outputs.type }} -m "chore: release v%s [skip ci]"
          git push --follow-tags
          npm publish --access public