name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          package-manager-cache: false
          # DO NOT set registry-url — OIDC handles auth automatically

      - run: corepack enable && pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm build

      - run: pnpm vitest run

      - name: Determine version bump
        id: bump
        run: |
          BUMP_TYPE=$(bash scripts/bump-version.sh)
          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and publish
        run: |
          npm version ${{ steps.bump.outputs.bump_type }} -m "chore: release v%s [skip ci]"
          git push --follow-tags
          npm publish --provenance --access public